<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Miguel Fresh Store</title>

    <link rel="stylesheet" href="registrasi.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<main class="reg-container">

    <h2>Registrasi</h2>

    <div class="reg-box">
        
        <form action="login.html" method="GET">
            
            <div class="form-group">
                 <label for="username">Nama Pengguna</label>
                 <input type="text" id="username" required placeholder="Contoh: miguel_fresh atau miguelfresh" pattern="^[a-zA-e0-9_]+$" title="Nama pengguna harus menyatu, hanya boleh menggunakan huruf, angka, dan underscore (_). Tidak boleh ada spasi!">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Masukkan email anda">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password baru">
            </div>

            <div class="form-group">
                <label for="confirm-password">Konfirmasi Password</label>
                <input type="password" id="confirm-password" required placeholder="Ulangi password anda">
            </div>

            <button type="submit" class="btn-registrasi">Registrasi</button>

        </form>

    </div>

</main>

</body>
</html>
