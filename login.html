<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Miguel Fresh Store</title>

    <link rel="stylesheet" href="login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<main class="login-container">

    <h2>Login</h2>

    <div class="login-box">
        
        <form action="index.html" method="GET">
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="Masukkan email anda">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Masukkan password anda">
            </div>

            <button type="submit" class="btn-masuk">Masuk</button>

        </form>

        <p class="reg-text">
            Belum punya akun? <a href="registrasi.html">Registrasi</a>
        </p>

    </div>

</main>

</body>
</html>
