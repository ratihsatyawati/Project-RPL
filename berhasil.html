<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Berhasil - Miguel Fresh Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f4fdf7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .sukses-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(40, 167, 69, 0.1);
            max-width: 450px;
            width: 90%;
            border: 1px solid #e1f5e7;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #28a745;
            color: white;
            font-size: 40px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        h2 {
            color: #1e7e34;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: #666666;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn-kembali {
            display: inline-block;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .btn-kembali:hover {
            background: #1e7e34;
        }
    </style>
</head>
<body>

<main class="sukses-container">
    <div class="icon-box">✓</div>
    <h2>Checkout Berhasil!</h2>
    <p>Pesanan Anda sedang diproses. Terima kasih telah berbelanja di Miguel Fresh Store.</p>
    <a href="index.html" class="btn-kembali">Kembali ke Beranda</a>
</main>

</body>
</html>
